<!DOCTYPE html>
<html lang="en">
<head>
    
</head>
<body>
    <script>
        var students = [
  { name: "Ali", age: 20, Crs: "CS" },
  { name: "Sara", age: 22, Crs: "Math" },
  { name: "Omar", age: 19, Crs: "Physics" },
  { name: "Laila", age: 21, Crs: "CS" },
  { name: "Hassan", age: 23, Crs: "Engineering" },
  { name: "Mona", age: 20, Crs: "Biology" },
  { name: "Kareem", age: 24, Crs: "Math" },
  { name: "Noor", age: 18, Crs: "CS" }
];
document.writeln("display all the students <br><br>");
for(var i=0;i<students.length;i++){
    document.writeln(students[i].name+" "+students[i].age+" "+students[i].Crs);
    document.writeln("<br>");
}
document.writeln("<br><br><br>");
document.writeln("find and search for a student by name <br><br>");
function search(name){
    for(var i=0;i<students.length;i++){
    if(students[i].name==name){
        document.writeln(students[i].name+" "+students[i].age+" "+students[i].Crs);
    }
}
}
search("Mona");
document.writeln("<br><br><br>");
document.writeln("find how many students are in the array <br><br>");
document.writeln(students.length);
document.writeln("<br><br><br>");
document.writeln("Get all students who are in cs <br><br>");
for(var i=0;i<students.length;i++){
    if(students[i].Crs=="CS"){
        document.writeln(students[i].name+" "+students[i].age+" "+students[i].Crs);
        document.writeln("<br>")
    }
}
document.writeln("<br><br><br>");
document.writeln("Find youngest student <br><br>");
var young = students[0].age;
var id = 0;
for(var i=0;i<students.length;i++){
    if(students[i].age<young){
        young=students[i].age;
        id=i;
    }
}
document.writeln(students[id].name+" "+students[id].age+" "+students[id].Crs);
document.writeln("<br><br><br>");
document.writeln("Sort Students by age <br><br>");
var students2 = [];
for(var i=0;i<students.length;i++){
    students2.push(students[i]);
}
students2.sort(function(a,b){
            return a.age-b.age;
        })
for(var i=0;i<students.length;i++){
    document.writeln(students2[i].name+" "+students2[i].age+" "+students2[i].Crs);
    document.writeln("<br>");
}
document.writeln("<br><br><br>");
document.writeln("Create a new array with only student names. <br><br>");
var students3 = [];
for(var i=0;i<students.length;i++){
    students3.push(students[i].name);
}
document.writeln(students3);
document.writeln("<br><br><br>");
document.writeln("Check if all students are above age  18 and return true or false <br><br>");
var c1 = 0;
for(var i=0;i<students.length;i++){
    if(students[i].age>18){
        c1++;
    }
}
if(c1==students.length){
    document.writeln(true)
}
else{
    document.writeln(false);
}

document.writeln("<br><br><br>");
document.writeln("Students Who Have the Same Crs <br><br>");
for(var i=0;i<students.length;i++){
    for(var j=0;j<students.length;j++){
        if(students[i].Crs==students[j].Crs&&students[i].name!=students[j].name){
            document.writeln(students[i].name+" "+students[i].age+" "+students[i].Crs);
            document.writeln(students[j].name+" "+students[j].age+" "+students[j].Crs);
            document.writeln("<br>")
        }
    }
}

document.writeln("<br><br><br>");
document.writeln("Calculate the average age of all students <br><br>");
var avg=0;
for(var i=0;i<students.length;i++){
    avg += students[i].age;
}
document.writeln(avg/students.length);

document.writeln("<br><br><br>");
document.writeln("Sort and Find top 3 oldest students <br><br>");
students2.sort(function(a,b){
            return b.age-a.age;
        })
for(var i=0;i<3;i++){
    document.writeln(students2[i].name+" "+students2[i].age+" "+students2[i].Crs);
    document.writeln("<br>");
}
document.writeln("<br><br><br>");
document.writeln("Find if there are students with the same name. <br><br>");
for(var i=0;i<students.length;i++){
    for(var j=0;j<students.length;j++){
        if(students[i].name==students[j].name&&i!=j){
            document.writeln(students[i].name+" "+students[i].age+" "+students[i].Crs);
            document.writeln(students[j].name+" "+students[j].age+" "+students[j].Crs);
            document.writeln("<br>")
            continue;
        }
    }
}

document.writeln("<br><br><br>");
document.writeln("Reverse the array without using .reverse()<br><br>");
var arr = [];
for(var i=students.length-1;i>=0;i--){
    arr.push(students[i]);
}
for(var i=0;i<arr.length;i++){
    document.writeln(arr[i].name+" "+arr[i].age+" "+arr[i].Crs);
    document.writeln("<br>")
}


document.writeln("<br><br><br>");
document.writeln("Add a new property email for each student in the format: name.toLowerCase'@iti.com'<br><br>");
var arr5 = [];
for(var i=0;i<students.length;i++){
    arr5.push(students[i].name+" "+students[i].age+" "+students[i].Crs+" "+students[i].name.toLowerCase()+"@iti.com");
}
for(var i=0;i<arr5.length;i++){
    document.writeln(arr5[i]);
    document.writeln("<br>");
}
</script>
</body>
</html>
