        Math5.prototype.sum = function(){
            if(nums.length!=0){
                let sum = 0;
                for(let i=0;i<nums.length;i++){
                    sum += nums[i];
                }
                return sum ;
            }
            else{
                console.log("the array is empty");
            }
        }
        Math5.prototype.multiply = function(){
            if(nums.length!=0 && !nums.includes(0)){
                let mul = 1;
                for(let i=0;i<nums.length;i++){
                    mul *= nums[i];
                }
                return mul;
            }
            else{
                console.log("the array is empty or the array has value zero");
            }
        }
