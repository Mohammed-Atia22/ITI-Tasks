<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            width: 100%;
            height: 100%;
            position: absolute;
        }
        .circle{
            width:100px;
            height:100px;
            border-radius: 50%;
            background-color: blue;
            position:absolute;
            animation: Animation;
            animation-duration: 20s;
            animation-iteration-count: infinite;
        }
        .circle:hover{
            animation-play-state: paused;
        }
        @keyframes Animation{
            0%{
                left: 0;
                top: 0;
                background-color: gray;
            }
            5%{
                left: 0;
                top: 450px;
                background-color: red;
            }
            10%{
                left: 150px;
                top: 450px;
                background-color: blueviolet;
            }
            15%{
                left: 150px;
                top: 0;
                background-color: beige;
            }
            20%{
                left: 150px;
                top: 0;
                background-color: cyan;
            }
            25%{
                left: 300px;
                top: 0;
                background-color: rgb(17, 0, 255);
            }
            30%{
                left: 300px;
                top: 450px;
                background-color: rgb(28, 197, 197);
            }
            35%{
                left: 450px;
                top: 450px;
                background-color: rgb(255, 225, 0);
            }
            40%{
                left: 450px;
                top: 0;
                background-color: rgb(230, 0, 255);
            }
            45%{
                left: 600px;
                top: 0;
                background-color: rgb(57, 91, 91);
            }
            50%{
                left: 600px;
                top: 450px;
                background-color: rgb(84, 214, 142);
            }
            55%{
                left: 750px;
                top: 450px;
                background-color: rgb(24, 37, 37);
            }
            60%{
                left: 750px;
                top: 0;
                background-color: rgb(0, 255, 38);
            }
            65%{
                left: 900px;
                top: 0;
                background-color: rgb(187, 0, 255);
            } 
            70%{
                left: 900px;
                top: 450px;
                background-color: rgb(68, 0, 255);
            } 
            75%{
                left: 1050px;
                top: 450px;
                background-color: rgb(255, 0, 0);
            } 
            80%{
                left: 1050px;
                top: 0;
                background-color: rgb(93, 102, 209);
            } 
            90%{
                left: 1200px;
                top: 0;
                background-color: rgb(37, 24, 75);
            } 
            100%{
                left: 1200px;
                top: 450px;
                background-color: rgb(0, 0, 0);
            } 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="circle"></div>
    </div>
</body>
</html>
